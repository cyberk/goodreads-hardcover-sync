name: Kindle to Hardcover Sync

on:
  schedule:
    # Runs at minute 0 of hour 0 (midnight) every day
    - cron: '0 0 * * *'
  # Allows you to run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of books to check (0 for all)'
        required: false
        default: '10'

jobs:
  sync_books:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Sync Script
      env:
        GOODREADS_RSS_URL: ${{ secrets.GOODREADS_RSS_URL }}
        HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
      run: |
        LIMIT="${{ inputs.limit }}"
        if [ -z "$LIMIT" ]; then LIMIT="10"; fi
        # Node script accepts --limit. 0 means all.
        npm run sync -- --limit $LIMIT