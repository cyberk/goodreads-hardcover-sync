name: Kindle to Hardcover Sync

on:
  schedule:
    # Runs at 08:00 UTC (Midnight PST) daily.
    # Note: GitHub Actions does not support dynamic cron schedules via secrets.
    # If you need a different timezone, you must edit this file directly.
    - cron: '0 8 * * *'
  # Allows you to run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of books to check (0 for all)'
        required: false
        default: '10'

jobs:
  sync_books:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Sync Script
      env:
        GOODREADS_RSS_URL: ${{ secrets.GOODREADS_RSS_URL }}
        HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
      run: |
        LIMIT="${{ inputs.limit }}"
        if [ -z "$LIMIT" ]; then LIMIT="10"; fi
        # Node script accepts --limit. 0 means all.
        npm run sync -- --limit $LIMIT